<!DOCTYPE html>
<html>
<head>
    <title>AI Cloud To-Do</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
        }

        .container {
            background: white;
            color: black;
            width: 350px;
            margin: 50px auto;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        input {
            padding: 10px;
            width: 70%;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px;
            margin: 5px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        .add { background: #28a745; color: white; }
        .delete { background: #dc3545; color: white; }
        .done { background: #007bff; color: white; }
        .clear { background: black; color: white; }

        li {
            list-style: none;
            margin: 10px 0;
            padding: 10px;
            background: #f1f1f1;
            border-radius: 8px;
        }

        .completed {
            text-decoration: line-through;
            color: gray;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>🤖 AI Cloud To-Do App</h2>

    <input id="task" placeholder="Enter task">
    <button class="add" onclick="add()">Add</button>

    <ul id="list"></ul>

    <button class="clear" onclick="clearAll()">Clear All</button>
</div>

<script>
let todos = JSON.parse(localStorage.getItem("todos")) || [];

function save() {
    localStorage.setItem("todos", JSON.stringify(todos));
}

function load() {
    let list = document.getElementById("list");
    list.innerHTML = "";

    todos.forEach((t, i) => {
        let li = document.createElement("li");

        li.innerHTML = `
            <span class="${t.done ? 'completed' : ''}">
                ${t.text} <br><small>${t.time}</small>
            </span>
            <br>
            <button class="done" onclick="toggle(${i})">✔</button>
            <button class="delete" onclick="del(${i})">❌</button>
        `;

        list.appendChild(li);
    });
}

function add() {
    let task = document.getElementById("task").value;

    if(task.trim() === "") return;

    let time = new Date().toLocaleString();

    todos.push({ text: task, done: false, time: time });

    save();
    load();

    document.getElementById("task").value = "";
}

function del(i) {
    todos.splice(i, 1);
    save();
    load();
}

function toggle(i) {
    todos[i].done = !todos[i].done;
    save();
    load();
}

function clearAll() {
    todos = [];
    save();
    load();
}

load();
</script>

</body>
</html>
