<!DOCTYPE html>
<html>
<head>
    <title>Aesthetic AI To-Do</title>

    <style>
        body {
            font-family: 'Segoe UI';
            background: linear-gradient(135deg, #ff9a9e, #fad0c4);
            text-align: center;
        }

        .container {
            width: 380px;
            margin: 50px auto;
            background: rgba(255,255,255,0.6);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h2 {
            margin-bottom: 5px;
        }

        #clock {
            font-size: 14px;
            margin-bottom: 15px;
        }

        input, select {
            padding: 10px;
            border-radius: 10px;
            border: none;
            margin: 5px;
        }

        button {
            padding: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .add { background: #6c5ce7; color: white; }
        .delete { background: #ff7675; color: white; }
        .done { background: #00b894; color: white; }

        li {
            list-style: none;
            margin: 10px;
            padding: 10px;
            border-radius: 10px;
            background: white;
        }

        .completed {
            text-decoration: line-through;
            color: gray;
        }

        .high { border-left: 5px solid red; }
        .medium { border-left: 5px solid orange; }
        .low { border-left: 5px solid green; }

        .filters button {
            margin: 3px;
            background: black;
            color: white;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>🌸 Aesthetic AI To-Do</h2>
    <div id="clock"></div>

    <input id="task" placeholder="Enter task ✨">
    <select id="priority">
        <option value="low">Low</option>
        <option value="medium">Medium</option>
        <option value="high">High</option>
    </select>

    <button class="add" onclick="add()">Add</button>

    <div class="filters">
        <button onclick="filterTasks('all')">All</button>
        <button onclick="filterTasks('done')">Completed</button>
        <button onclick="filterTasks('pending')">Pending</button>
    </div>

    <p id="count"></p>

    <ul id="list"></ul>

    <button onclick="clearAll()">Clear All</button>
</div>

<script>
let todos = JSON.parse(localStorage.getItem("todos")) || [];
let currentFilter = "all";

function save() {
    localStorage.setItem("todos", JSON.stringify(todos));
}

function load() {
    let list = document.getElementById("list");
    list.innerHTML = "";

    let filtered = todos.filter(t => {
        if(currentFilter === "done") return t.done;
        if(currentFilter === "pending") return !t.done;
        return true;
    });

    filtered.forEach((t, i) => {
        let li = document.createElement("li");
        li.className = t.priority;

        li.innerHTML = `
            <span class="${t.done ? 'completed' : ''}">
                ${t.text}
            </span>
            <br>
            <small>${t.time}</small>
            <br>
            <button class="done" onclick="toggle(${i})">✔</button>
            <button class="delete" onclick="del(${i})">❌</button>
        `;

        list.appendChild(li);
    });

    document.getElementById("count").innerText =
        "Total: " + todos.length + " | Completed: " + todos.filter(t=>t.done).length;
}

function add() {
    let text = document.getElementById("task").value;
    let priority = document.getElementById("priority").value;

    if(text.trim() === "") return;

    todos.push({
        text,
        done: false,
        time: new Date().toLocaleString(),
        priority
    });

    save();
    load();

    document.getElementById("task").value = "";
}

function del(i) {
    todos.splice(i, 1);
    save();
    load();
}

function toggle(i) {
    todos[i].done = !todos[i].done;
    save();
    load();
}

function clearAll() {
    todos = [];
    save();
    load();
}

function filterTasks(type) {
    currentFilter = type;
    load();
}

function updateClock() {
    document.getElementById("clock").innerText =
        new Date().toLocaleTimeString();
}

setInterval(updateClock, 1000);

load();
</script>

</body>
</html>
